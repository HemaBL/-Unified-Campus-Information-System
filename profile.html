<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <span class="back-arrow" onclick="goBack()">⬅</span>
  <div class="logo">UCIS</div>
  <div class="nav-actions">

    
  <button onclick="logout()">Logout</button>
</header>

<div class="profile-container">
<!-- Profile Card -->
<div class="profile-wrapper">
  <div class="profile-card">

    <!-- Avatar -->
    <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
         alt="Avatar"
         class="avatar">

    <!-- Username -->
    <h2 id="username">Username</h2>

    <!-- Role Badge -->
    <span id="role" class="role-badge">Role</span>
  </div>
    
  

<script>
  const user = JSON.parse(localStorage.getItem("loggedInUser"));

  if (!user) {
    window.location.href = "login.html";
  }

  document.getElementById("username").innerText = user.username;
  document.getElementById("role").innerText = user.role;

  function logout() {
    localStorage.removeItem("loggedInUser");
    window.location.href = "index.html";
  }

  function goBack() {
    window.location.href = "dashboard.html";
  }
</script>
<style>



body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  background-image:url(https://i.pinimg.com/736x/99/95/89/9995893647cf3b50585b0ef801a98157.jpg) ;
  display: flex;
  justify-content: center;
  align-items: center;
}


.navbar {
  position: absolute;
  top: 0;
  width: 100%;
  padding: 15px 25px;
  display: flex;
  align-items: center;
  color: rgb(255, 255, 255);
  background-color: #080530;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  margin-left: 15px;
}

.back-arrow {
  font-size: 26px;
  cursor: pointer;
}



.profile-card {
  background: rgba(207, 200, 200, 0.679);
  backdrop-filter: blur(10px);
  padding: 50px;
  width: 400px;
  border-radius: 20px;
  text-align: center;
  color: rgb(0, 0, 0);
  font-size: 20px;
  box-shadow: 0 8px 30px rgba(225, 218, 218, 0.825);
}


.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 4px solid rgb(126, 120, 120);
}


.profile-card h2 {
  margin: 10px 0;
}


.role-badge {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 20px;
  background: #00c6ff;
  color: black;
  font-weight: bold;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden; 
  font-family: Arial, sans-serif;
}

button {
  padding: 8px 18px;
  background-color: #e53935;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  font-weight: bolder;
}

button:hover {
  background-color: #c62828;
}


</style>

</body>

</html>
